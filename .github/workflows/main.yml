name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true  # <--- ADICIONADO: Isso baixa os arquivos grandes corretamente

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to Hugging Face Space
        env:
          HF_USERNAME: willp01
          HF_SPACE_NAME: AI_Assistent_v8
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Habilita o LFS explicitamente para o push
          git lfs install
          
          # Adiciona o remote
          git remote add hf https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}
          
          # Push com force para garantir a sincronia
          git push hf main --force
          
          echo "Sincronização concluída!"
